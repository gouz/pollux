<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Pollux</title>
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗳️</text></svg>"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
        />
        <style>
            html,
            body {
                height: 100vh;
            }
            body {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            main {
                display: grid;
                gap: 1vh;
                grid-template-columns: 1;
            }
            progress {
                margin: 0;
            }
            article header {
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 0;
                padding: calc(var(--pico-block-spacing-vertical) * 0.33)
                    var(--pico-block-spacing-horizontal);

                .counter {
                    font-size: 0.6em;
                }
            }
            @media (min-width: 768px) {
                main {
                    grid-template-columns: repeat(2, 1fr);
                    &:has(> :nth-child(1):last-child) {
                        grid-template-columns: repeat(1, minmax(0, 25%));
                        justify-content: center;
                    }
                    &:has(> :nth-child(2):last-child) {
                        grid-template-columns: repeat(2, 1fr);
                    }
                }
            }
            @media (min-width: 1224px) {
                main {
                    grid-template-columns: repeat(2, 1fr);
                    &:has(> :nth-child(1):last-child) {
                        grid-template-columns: repeat(1, minmax(0, 25%));
                        justify-content: center;
                    }
                    &:has(> :nth-child(2):last-child) {
                        grid-template-columns: repeat(2, 1fr);
                    }
                    &:has(> :nth-child(3):last-child) {
                        grid-template-columns: repeat(3, 1fr);
                    }
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <main></main>
        </div>
    </body>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <script>
        const $main = document.querySelector("main");
        const choices = [
            ...LZString.decompressFromEncodedURIComponent(
                window.location.hash.slice(1),
            ).split("|"),
        ]
            .map((c) => c.trim())
            .filter((c) => c !== "");
        const uuid = choices.shift();
        const isUUIDv7 = (str) =>
            /^[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(
                str,
            );

        if (isUUIDv7(uuid)) {
            const ws = new WebSocket(
                `ws${window.location.protocol.includes("https") ? "s" : ""}://${window.location.host}/ws?uuid=${uuid}`,
            );

            choices.forEach((choice, num) => {
                const result = document.createElement("article");
                const header = document.createElement("header");
                const label = document.createElement("span");
                const counter = document.createElement("span");
                const progress = document.createElement("progress");
                counter.classList.add("counter");
                label.textContent = choice;
                header.append(label);
                header.append(counter);
                result.append(header);
                result.append(progress);
                result.dataset.vote = num;
                $main.append(result);
            });

            ws.onmessage = (event) => {
                const json = JSON.parse(event.data);
                const sum = [...json.result].reduce(
                    (acc, j) => acc + j.total,
                    0,
                );
                [...document.querySelectorAll("progress")].forEach(
                    (progress) => {
                        progress.value = 0;
                    },
                );

                json.result.forEach(({ choice, total }) => {
                    const $progress = document.querySelector(
                        `article[data-vote="${choice}"]`,
                    );
                    $progress.querySelector("progress").value = Math.round(
                        (100 * total) / sum,
                    );
                    $progress.querySelector(".counter").textContent =
                        `(${total} / ${sum})`;
                });
            };
        } else {
            const error = document.createElement("div");
            error.id = "error";
            error.textContent = "No choice";
            $main.append(error);
        }
    </script>
</html>
