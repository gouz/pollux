<!doctype html>
<html>
    <head>
        <title>Pollux</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗳️</text></svg>"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
        />
        <style>
            html,
            body {
                height: 100vh;
            }
            body {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            main {
                display: grid;
                gap: 1vh;
                grid-template-columns: 1;
            }
            @media (min-width: 768px) {
                main {
                    grid-template-columns: repeat(2, 1fr);
                    &:has(> :nth-child(1):last-child) {
                        grid-template-columns: repeat(1, minmax(0, 25%));
                        justify-content: center;
                    }
                    &:has(> :nth-child(2):last-child) {
                        grid-template-columns: repeat(2, 1fr);
                    }
                }
            }
            @media (min-width: 1224px) {
                main {
                    grid-template-columns: repeat(2, 1fr);
                    &:has(> :nth-child(1):last-child) {
                        grid-template-columns: repeat(1, minmax(0, 25%));
                        justify-content: center;
                    }
                    &:has(> :nth-child(2):last-child) {
                        grid-template-columns: repeat(2, 1fr);
                    }
                    &:has(> :nth-child(3):last-child) {
                        grid-template-columns: repeat(3, 1fr);
                    }
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <main></main>
        </div>
    </body>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <script>
        const $main = document.querySelector("main");
        const choices = [
            ...LZString.decompressFromEncodedURIComponent(
                window.location.hash.slice(1),
            ).split("|"),
        ]
            .map((c) => c.trim())
            .filter((c) => c !== "");
        const uuid = choices.shift();
        const isUUIDv7 = (str) =>
            /^[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(
                str,
            );

        const STORAGE_KEY = "pollux_voted";

        const allreadyVoted = (uuid) => {
            const votes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            return votes.includes(uuid);
        };

        const vote = (uuid) => {
            let votes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            if (!votes.includes(uuid)) {
                votes.push(uuid);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(votes));
            }
        };

        const error = (text) => {
            const errorEl = document.createElement("div");
            errorEl.id = "error";
            errorEl.textContent = text;
            $main.append(errorEl);
        };

        if (isUUIDv7(uuid) && choices.length) {
            if (allreadyVoted(uuid)) {
                error("All ready voted");
            } else {
                choices.forEach((choice, num) => {
                    const button = document.createElement("button");
                    button.textContent = choice;
                    $main.append(button);
                    button.addEventListener("click", () => {
                        vote(uuid);
                        fetch("/api/vote", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({
                                uuid,
                                choice: num,
                            }),
                        });
                        [...document.querySelectorAll("button")].forEach(
                            (button) => {
                                button.disabled = true;
                            },
                        );
                    });
                });
            }
        } else {
            error("No choice");
        }
    </script>
</html>
